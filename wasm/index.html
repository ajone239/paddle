<!doctype html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
    <title>Paddle: A simple lisp</title>
    <meta name="description"
        content="Paddle is a simple Lisp interpreter. Try it live in the browser, compiled to WebAssembly." />
    <meta name="theme-color" content="#0d1117" />
    <link rel="canonical" href="https://ajone239.github.io/paddle/" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>λ</text></svg>" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Paddle" />
    <meta property="og:title" content="Paddle: A simple lisp" />
    <meta property="og:description"
        content="Paddle is a simple Lisp interpreter. Try it live in the browser, compiled to WebAssembly." />
    <meta property="og:url" content="https://ajone239.github.io/paddle/" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Paddle: A simple lisp" />
    <meta name="twitter:description"
        content="Paddle is a simple Lisp interpreter. Try it live in the browser, compiled to WebAssembly." />

    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <script type="module">
        import init, {Runner, Tag} from './pkg/paddle_wasm.js';

        const paddle_figlet = String.raw`
    ____            __    ____
   / __ \____ _____/ /___/ / /__
  / /_/ / __  / __  / __  / / _ \
 / ____/ /_/ / /_/ / /_/ / /  __/
/_/    \__,_/\__,_/\__,_/_/\___/`

        document.getElementById('paddle-deco').textContent = paddle_figlet;

        const setAppHeight = () => {
            const vv = window.visualViewport;
            const height = vv ? vv.height : window.innerHeight;
            const top = vv ? vv.offsetTop : 0;
            document.documentElement.style.setProperty('--app-height', `${height}px`);
            document.documentElement.style.setProperty('--app-top', `${top}px`);
        };
        setAppHeight();
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', setAppHeight);
            window.visualViewport.addEventListener('scroll', setAppHeight);
        } else {
            window.addEventListener('resize', setAppHeight);
        }

        init().then(() => {
            const runner = Runner.new();
            let promptNum = 0;

            const tagToStyle = (tag) => {
                switch (tag) {
                    case Tag.Print:
                        return 'print';
                    case Tag.Ok:
                        return 'ok';
                    case Tag.Source:
                        return 'src';
                    default:
                        return 'err';
                }
            };

            const insertContent = (tag, content) => {
                let output = document.getElementById('output');
                const entry = document.createElement('li');
                entry.className = tagToStyle(tag);
                entry.dataset.prompt = promptNum;
                entry.appendChild(document.createTextNode(content));

                output.appendChild(entry);
                let outputArea = document.getElementById('output-area');
                outputArea.scrollTop = outputArea.scrollHeight;

                return entry;
            };

            const runit = () => {
                let input_el = document.getElementById('input');
                let input = input_el.value;

                if (!input) {
                    return;
                }

                promptNum++;

                let src_entry = insertContent(Tag.Source, input);
                src_entry.tabIndex = 0;
                src_entry.setAttribute('role', 'button');
                src_entry.setAttribute('aria-label', 'Restore this input');

                const restore = () => {
                    input_el.value = input;
                    input_el.focus();
                };
                src_entry.addEventListener('click', restore);
                src_entry.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        restore();
                    }
                });

                input_el.value = '';

                runner.run_code(input, insertContent);
            };

            document.getElementById('input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    runit();
                }
            });
            document.getElementById('clear').addEventListener('click', () => {
                let output = document.getElementById('output');
                while (output.firstChild) {
                    output.removeChild(output.lastChild);
                }
            });
            document.getElementById('run').addEventListener('click', runit);
        }).catch(err => alert(JSON.stringify(err)));
    </script>

    <div id="wrapper">
        <pre id="paddle-deco"></pre>
        <div id="output-area" role="log" aria-live="polite">
            <ol id="output"></ol>
        </div>

        <div id="input-area">
            <textarea autofocus id="input" placeholder="Input Paddle source..."></textarea>
            <div id="button-area">
                <button id="run">run</button>
                <button id="clear">clear</button>
            </div>
        </div>
    </div>
</body>

</html>
