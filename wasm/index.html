<!doctype html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <title>very basic runner example</title>
</head>

<body>
    <script type="module">
        import init, {run_code} from "./pkg/wasm.js";

        init().then(() => {
            alert("ready");
        });

        document.getElementById("run")
        .addEventListener("click", () => {
            let input = document.getElementById("input").value;

            console.log(input)
            run_code(input);
        });

    </script>

    <div>
        <textarea id="input"></textarea>
    </div>
    <div>
        <button id="run">run</button>
    </div>
</body>

</html>
