<!doctype html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <title>very basic runner example</title>
</head>

<body>
    <script type="module">
        import init, {Runner} from "./pkg/wasm.js";

        init().then(() => {
            alert("ready");

            const runner = Runner.new();

            document.getElementById("run")
                .addEventListener("click", () => {
                    let input = document.getElementById("input").value;

                    runner.run_code(input);

                    let res_ptr = runner.results_ptr();
                    let res_len = runner.results_len();

                    console.log(res_ptr);
                    console.log(res_len);
                });
        });
    </script>

    <div>
        <textarea id="input"></textarea>
    </div>
    <div>
        <button id="run">run</button>
    </div>
</body>

</html>
